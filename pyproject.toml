[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "PFASgroups"
version = "1.2.0"
description = "A Python module for parsing and visualizing PFAS groups."
authors = [
    { name = "Luc Miaz", email = "luc@miaz.ch" }
]
readme = "README.md"
requires-python = ">=3.7"
license = {text = "CC-BY-NC-4.0"}
dependencies = [
    "rdkit",
    "numpy",
    "pandas",
    "networkx",
    "tqdm",
    "svgutils"
]

[tool.setuptools]
packages = ["PFASgroups"]

[tool.setuptools.package-data]
PFASgroups = ["data/*.json", "data/*.txt"]
