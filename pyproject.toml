[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "PFASgroups"
version = "1.0.1"
description = "A Python module for parsing and visualizing PFAS groups."
authors = [
    { name = "Luc Miaz", email = "luc@miaz.ch" }
]
readme = "README.md"
requires-python = ">=3.7"
dependencies = [
    "rdkit",
    "numpy",
    "pandas",
    "networkx",
    "tqdm",
    "svgutils"
]
