name: Python Package

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install RDKit and conda dependencies
      uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: ${{ matrix.python-version }}
        channels: conda-forge,defaults
        channel-priority: strict
        activate-environment: test-env
        auto-activate-base: false

    - name: Install package and dependencies
      shell: bash -el {0}
      run: |
        conda install -y -c conda-forge rdkit
        pip install -e ".[dev,database]"
        pip install scipy Pillow svgutils flake8 pytest-timeout

    - name: Lint with flake8
      shell: bash -el {0}
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
          --exclude=.git,__pycache__,.venv,dist,build,*.egg-info,benchmark,specificity
        # Treat all other issues as warnings only
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 \
          --exclude=.git,__pycache__,.venv,dist,build,*.egg-info,benchmark,specificity --statistics

    - name: Test with pytest
      shell: bash -el {0}
      run: |
        pytest tests/ --timeout=120 -v
