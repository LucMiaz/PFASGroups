name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # e.g. v3.3.0

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: PFASGroups-gui-windows.zip

          - os: ubuntu-latest
            artifact_name: PFASGroups-gui-linux.tar.gz

          - os: macos-latest
            artifact_name: PFASGroups-gui-macos.tar.gz

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v4

      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.11"
          channels: conda-forge,defaults
          channel-priority: strict
          activate-environment: build-env
          auto-activate-base: false

      - name: Install dependencies
        run: |
          conda install -y -c conda-forge rdkit
          pip install -e ".[gui]"
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller \
            --onedir \
            --windowed \
            --name PFASGroups-gui \
            --collect-all PySide6 \
            --collect-all plotly \
            --add-data "gui/data:gui/data" \
            --add-data "PFASGroups/data:PFASGroups/data" \
            gui/__main__.py

      - name: Package - Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\PFASGroups-gui -DestinationPath ${{ matrix.artifact_name }}

      - name: Package - Linux
        if: runner.os == 'Linux'
        run: tar -czf ${{ matrix.artifact_name }} -C dist PFASGroups-gui

      - name: Package - macOS
        if: runner.os == 'macOS'
        run: tar -czf ${{ matrix.artifact_name }} -C dist PFASGroups-gui.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/PFASGroups-gui-windows.zip/PFASGroups-gui-windows.zip
            dist/PFASGroups-gui-linux.tar.gz/PFASGroups-gui-linux.tar.gz
            dist/PFASGroups-gui-macos.tar.gz/PFASGroups-gui-macos.tar.gz
