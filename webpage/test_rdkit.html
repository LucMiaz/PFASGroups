<!DOCTYPE html>
<html>
<head>
    <title>Test PFAS Analyzer</title>
</head>
<body>
    <h1>Testing PFAS Analyzer</h1>
    <p>Open the browser console to see results</p>
    
    <script src="https://unpkg.com/@rdkit/rdkit/Code/MinimalLib/dist/RDKit_minimal.js"></script>
    <script>
        window.initRDKitModule().then(function(RDKit) {
            console.log('RDKit loaded');
            
            // Test PFOA
            const pfoa = 'C(=O)(C(C(C(C(C(C(C(F)(F)F)(F)F)(F)F)(F)F)(F)F)(F)F)(F)F)O';
            console.log('Testing PFOA:', pfoa);
            
            const mol = RDKit.get_mol(pfoa);
            console.log('Molecule parsed:', mol.is_valid());
            
            // Count atoms
            const atomCount = mol.get_num_atoms();
            console.log('Number of atoms:', atomCount);
            
            const formulaDict = {};
            for (let i = 0; i < atomCount; i++) {
                const atom = mol.get_atom(i);
                const symbol = atom.get_symbol();
                formulaDict[symbol] = (formulaDict[symbol] || 0) + 1;
                
                // Check for implicit hydrogens
                try {
                    const implicitH = atom.get_total_num_hs();
                    console.log(`Atom ${i} (${symbol}): implicit H = ${implicitH}`);
                    if (implicitH > 0) {
                        formulaDict['H'] = (formulaDict['H'] || 0) + implicitH;
                    }
                } catch (e) {
                    console.log(`Atom ${i} (${symbol}): no implicit H method`);
                }
            }
            
            console.log('Formula dict:', formulaDict);
            console.log('Expected: C=8, H=1, O=2, F=15');
            
            // Check PFCA constraint
            const C = formulaDict.C || 0;
            const F = formulaDict.F || 0;
            const expectedPFCA = F / 2 + 0.5;
            console.log(`PFCA check: C=${C}, expected=${expectedPFCA}, match=${C === expectedPFCA}`);
            
            // Check PolyFCA constraint
            const H = formulaDict.H || 0;
            const expectedPolyFCA = (F + H) / 2 + 0;
            console.log(`PolyFCA check: C=${C}, expected=${expectedPolyFCA}, match=${C === expectedPolyFCA}`);
            
            mol.delete();
        });
    </script>
</body>
</html>
