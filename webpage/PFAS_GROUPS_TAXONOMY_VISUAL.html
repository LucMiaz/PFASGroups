<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PFAS Groups Taxonomy Visualization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .controls {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .controls button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .controls button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .btn-expand {
            background: #28a745;
            color: white;
        }

        .btn-collapse {
            background: #dc3545;
            color: white;
        }

        .btn-filter {
            background: #007bff;
            color: white;
        }

        .btn-filter.active {
            background: #0056b3;
        }

        .legend {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 2px solid #333;
        }

        .content {
            padding: 30px;
            overflow-x: auto;
        }

        .tree {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tree-section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 15px;
            padding: 10px;
            background: #ecf0f1;
            border-left: 5px solid #3498db;
            border-radius: 4px;
        }

        .node {
            margin-left: 20px;
            position: relative;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            background: white;
        }

        .node:hover {
            transform: translateX(5px);
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
        }

        .node::before {
            content: '';
            position: absolute;
            left: -15px;
            top: 50%;
            width: 15px;
            height: 2px;
            background: #95a5a6;
        }

        .node-header {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .node-toggle {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #3498db;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .node-toggle.collapsed::after {
            content: '+';
        }

        .node-toggle.expanded::after {
            content: '−';
        }

        .node-id {
            background: #3498db;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.85em;
            flex-shrink: 0;
        }

        .node-name {
            font-weight: 600;
            font-size: 1.05em;
            color: #2c3e50;
            flex-grow: 1;
        }

        .node-alias {
            color: #7f8c8d;
            font-size: 0.9em;
            font-style: italic;
        }

        .node-details {
            margin-top: 10px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 4px;
            font-size: 0.9em;
            line-height: 1.6;
            border-left: 3px solid #3498db;
        }

        .node-details.hidden {
            display: none;
        }

        .detail-row {
            margin-bottom: 8px;
            display: flex;
            gap: 8px;
        }

        .detail-label {
            font-weight: bold;
            color: #34495e;
            min-width: 120px;
        }

        .detail-value {
            color: #555;
            font-family: 'Courier New', monospace;
            flex: 1;
        }

        .node-children {
            margin-left: 30px;
            border-left: 2px solid #bdc3c7;
            padding-left: 10px;
            margin-top: 10px;
        }

        .node-children.hidden {
            display: none;
        }

        /* Color coding by category */
        .node.oecd-carboxylic { border-left: 5px solid #e74c3c; }
        .node.oecd-sulfonic { border-left: 5px solid #f39c12; }
        .node.oecd-other-acids { border-left: 5px solid #d35400; }
        .node.oecd-alcohols { border-left: 5px solid #3498db; }
        .node.oecd-ethers { border-left: 5px solid #2980b9; }
        .node.oecd-alkenes { border-left: 5px solid #1abc9c; }
        .node.oecd-alkanes { border-left: 5px solid #16a085; }
        .node.oecd-halides { border-left: 5px solid #9b59b6; }
        .node.oecd-other { border-left: 5px solid #95a5a6; }
        .node.generic-oxygen { border-left: 5px solid #3498db; }
        .node.generic-sulfur { border-left: 5px solid #f39c12; }
        .node.generic-phosphorus { border-left: 5px solid #e67e22; }
        .node.generic-nitrogen { border-left: 5px solid #9b59b6; }
        .node.generic-halogen { border-left: 5px solid #8e44ad; }
        .node.generic-unsaturated { border-left: 5px solid #1abc9c; }
        .node.generic-saturated { border-left: 5px solid #27ae60; }

        .stats {
            padding: 20px 30px;
            background: #ecf0f1;
            border-top: 2px solid #bdc3c7;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #3498db;
        }

        .stat-label {
            color: #7f8c8d;
            margin-top: 5px;
        }

        .search-box {
            flex: 1;
            min-width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #3498db;
        }

        .node.highlight {
            background: #fff3cd;
            border-color: #ffc107;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .search-box {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔬 PFAS Groups Taxonomy</h1>
            <p>Comprehensive visualization of OECD and Generic PFAS group classifications</p>
        </div>

        <div class="controls">
            <button class="btn-expand" onclick="expandAll()">📂 Expand All</button>
            <button class="btn-collapse" onclick="collapseAll()">📁 Collapse All</button>
            <button class="btn-filter" id="filter-oecd" onclick="toggleFilter('oecd')">OECD Groups (1-28)</button>
            <button class="btn-filter" id="filter-generic" onclick="toggleFilter('generic')">Generic Groups (29-51)</button>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="🔍 Search groups by name, ID, or alias..." oninput="searchGroups(this.value)">
            </div>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background: #e74c3c;"></div>
                <span>Carboxylic Acids</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #f39c12;"></div>
                <span>Sulfonic Acids</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #3498db;"></div>
                <span>Alcohols/O-containing</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #2980b9;"></div>
                <span>Ethers</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #1abc9c;"></div>
                <span>Alkenes/Unsaturated</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #16a085;"></div>
                <span>Alkanes</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #9b59b6;"></div>
                <span>N-containing/Halides</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #27ae60;"></div>
                <span>Aromatics</span>
            </div>
        </div>

        <div class="content" id="tree-container">
            <!-- Tree will be generated by JavaScript -->
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value">51</div>
                <div class="stat-label">Total Groups</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">26</div>
                <div class="stat-label">OECD Groups</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">23</div>
                <div class="stat-label">Generic Groups</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">12</div>
                <div class="stat-label">With Path Matching</div>
            </div>
        </div>
    </div>

    <script>
        const pfasData = {

                            { id: 7, name: "Polyfluoroalkyl sulfonic acid", alias: "PolyFSAs", smarts1: "[#6$([#6][#16](=O)(=O)[OH1])]", constraints: "C_rel: (F,H,Cl,Br,I) ≥ (C-1)*0.5/2", parent: 36, children: [10] },
                            { id: 8, name: "Perfluoroalkyl disulfonic acids", alias: "PFdiSAs", smarts1: "[#6$([#6][#16](=O)(=O)[OH1])]", smarts2: "[#6$([#6][#16](=O)(=O)[OH1])]", path: "per", constraints: "C_rel: (F) ≥ C*0.5/2", parent: 36 },

                            { id: 44, name: "azole", alias: "azole", smarts1: "[$(*[#7r5,$([#6r5,#8r5,#16r5]:[#7r5]),$(...:[#7r5])])]", parent: [51, 22] },
                            { id: 45, name: "azine", alias: "azine", smarts1: "[$(*[#7r6,$([#6r6,#8r6,#16r6]:[#7r6]),$(...:[#7r6])])]", parent: [51, 22] },
                            { id: 46, name: "benzodioxole", alias: "benzodioxole", smarts1: "[$([#6]1[#6][#6]([#6]2[#6]([#6]1)[#8][#6][#8]2))]", constraints: "F ≥ 2", parent: [31, 51, 22] },
                            { id: 51, name: "Side-chain aromatics", alias: "Side-chain aromatics", smarts1: "[#6X4$([#6]a)]", children: [22, 44, 45, 46] }
                        ]
                    }
                }
            }
        };

        let activeFilters = { oecd: true, generic: true };

        function renderTree() {
            const container = document.getElementById('tree-container');
            container.innerHTML = '';

            if (activeFilters.oecd) {
                renderSection(container, pfasData.oecd, 'oecd');
            }
            if (activeFilters.generic) {
                renderSection(container, pfasData.generic, 'generic');
            }
        }

        function renderSection(container, data, type) {
            const section = document.createElement('div');
            section.className = 'tree-section';
            section.dataset.type = type;

            const title = document.createElement('div');
            title.className = 'section-title';
            title.textContent = data.title;
            section.appendChild(title);

            for (const [categoryName, categoryData] of Object.entries(data.categories)) {
                const categoryDiv = document.createElement('div');
                categoryDiv.style.marginBottom = '15px';

                const categoryTitle = document.createElement('h3');
                categoryTitle.textContent = categoryName;
                categoryTitle.style.marginLeft = '10px';
                categoryTitle.style.color = '#34495e';
                categoryDiv.appendChild(categoryTitle);

                for (const group of categoryData.groups) {
                    categoryDiv.appendChild(createNode(group, categoryData.class));
                }

                section.appendChild(categoryDiv);
            }

            container.appendChild(section);
        }

        function createNode(group, className) {
            const node = document.createElement('div');
            node.className = `node ${className}`;
            node.dataset.id = group.id;
            node.dataset.name = group.name.toLowerCase();
            node.dataset.alias = group.alias.toLowerCase();

            const header = document.createElement('div');
            header.className = 'node-header';

            const hasChildren = group.children && group.children.length > 0;
            if (hasChildren) {
                const toggle = document.createElement('div');
                toggle.className = 'node-toggle collapsed';
                toggle.onclick = (e) => {
                    e.stopPropagation();
                    toggleNode(node);
                };
                header.appendChild(toggle);
            }

            const id = document.createElement('span');
            id.className = 'node-id';
            id.textContent = group.id;
            header.appendChild(id);

            const name = document.createElement('span');
            name.className = 'node-name';
            name.textContent = group.name;
            header.appendChild(name);

            const alias = document.createElement('span');
            alias.className = 'node-alias';
            alias.textContent = `(${group.alias})`;
            header.appendChild(alias);

            node.appendChild(header);

            // Details
            const details = document.createElement('div');
            details.className = 'node-details hidden';

            if (group.smarts1) {
                details.appendChild(createDetailRow('SMARTS1', group.smarts1));
            }
            if (group.smarts2) {
                details.appendChild(createDetailRow('SMARTS2', group.smarts2));
            }
            if (group.path) {
                details.appendChild(createDetailRow('Path Type', group.path));
            }
            if (group.constraints) {
                details.appendChild(createDetailRow('Constraints', group.constraints));
            }
            if (group.parent) {
                const parents = Array.isArray(group.parent) ? group.parent : [group.parent];
                details.appendChild(createDetailRow('Parent(s)', parents.join(', ')));
            }
            if (hasChildren) {
                details.appendChild(createDetailRow('Children', group.children.join(', ')));
            }

            node.appendChild(details);

            node.onclick = () => toggleDetails(node);

            return node;
        }

        function createDetailRow(label, value) {
            const row = document.createElement('div');
            row.className = 'detail-row';

            const labelSpan = document.createElement('span');
            labelSpan.className = 'detail-label';
            labelSpan.textContent = label + ':';

            const valueSpan = document.createElement('span');
            valueSpan.className = 'detail-value';
            valueSpan.textContent = value;

            row.appendChild(labelSpan);
            row.appendChild(valueSpan);
            return row;
        }

        function toggleDetails(node) {
            const details = node.querySelector('.node-details');
            details.classList.toggle('hidden');
        }

        function toggleNode(node) {
            const toggle = node.querySelector('.node-toggle');
            const children = node.querySelector('.node-children');
            
            if (toggle) {
                toggle.classList.toggle('collapsed');
                toggle.classList.toggle('expanded');
            }
            
            if (children) {
                children.classList.toggle('hidden');
            }
        }

        function expandAll() {
            document.querySelectorAll('.node-details').forEach(el => el.classList.remove('hidden'));
            document.querySelectorAll('.node-toggle').forEach(el => {
                el.classList.remove('collapsed');
                el.classList.add('expanded');
            });
            document.querySelectorAll('.node-children').forEach(el => el.classList.remove('hidden'));
        }

        function collapseAll() {
            document.querySelectorAll('.node-details').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.node-toggle').forEach(el => {
                el.classList.add('collapsed');
                el.classList.remove('expanded');
            });
            document.querySelectorAll('.node-children').forEach(el => el.classList.add('hidden'));
        }

        function toggleFilter(type) {
            activeFilters[type] = !activeFilters[type];
            const btn = document.getElementById(`filter-${type}`);
            btn.classList.toggle('active');
            renderTree();
        }

        function searchGroups(query) {
            const nodes = document.querySelectorAll('.node');
            query = query.toLowerCase().trim();

            nodes.forEach(node => {
                node.classList.remove('highlight');
                
                if (!query) {
                    node.style.display = '';
                    return;
                }

                const id = node.dataset.id;
                const name = node.dataset.name;
                const alias = node.dataset.alias;

                if (id.includes(query) || name.includes(query) || alias.includes(query)) {
                    node.style.display = '';
                    node.classList.add('highlight');
                } else {
                    node.style.display = 'none';
                }
            });
        }

        // Initialize
        renderTree();
    </script>
</body>
</html>
