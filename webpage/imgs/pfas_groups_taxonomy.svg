<!-- PFAS Groups Taxonomy Diagram -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" width="1200" height="1600">
  <defs>
    <style>
      .category { fill: #667eea; stroke: #764ba2; stroke-width: 3; }
      .subcat { fill: #e7f3ff; stroke: #667eea; stroke-width: 2; }
      .group { fill: #ffffff; stroke: #999; stroke-width: 1; }
      .title-text { font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; text-anchor: middle; fill: white; }
      .cat-text { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; }
      .subcat-text { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
      .group-text { font-family: Arial, sans-serif; font-size: 11px; text-anchor: start; }
      .connector { stroke: #999; stroke-width: 2; fill: none; }
    </style>
  </defs>
  
  <!-- Main Title -->
  <rect x="350" y="20" width="500" height="60" class="category" rx="10"/>
  <text x="600" y="55" class="title-text">PFAS Chemical Groups</text>
  
  <!-- Category 1: Perfluoroalkyl Acids -->
  <rect x="50" y="120" width="350" height="50" class="category" rx="8"/>
  <text x="225" y="150" class="cat-text" fill="white">Perfluoroalkyl Acids</text>
  
  <!-- Carboxylic Acids Branch -->
  <line x1="150" y1="170" x2="150" y2="210" class="connector"/>
  <rect x="50" y="210" width="200" height="40" class="subcat" rx="5"/>
  <text x="150" y="235" class="subcat-text">Carboxylic Acids</text>
  
  <line x1="150" y1="250" x2="150" y2="270" class="connector"/>
  <rect x="20" y="270" width="260" height="120" class="group" rx="3"/>
  <text x="30" y="290" class="group-text" font-weight="bold">Perfluoroalkyl carboxylic acids (PFCAs)</text>
  <text x="30" y="305" class="group-text">• C = F/2 + 0.5</text>
  <text x="30" y="320" class="group-text">• Examples: PFOA, PFNA, PFDA</text>
  <text x="30" y="335" class="group-text" font-style="italic">Polyfluoroalkyl carboxylic acids (PolyFCAs)</text>
  <text x="30" y="350" class="group-text">• C = (F+H+Cl+Br+I)/2</text>
  <text x="30" y="365" class="group-text" font-style="italic">Perfluoroalkylether carboxylic acids (PFECAs)</text>
  <text x="30" y="380" class="group-text">• Contains ether linkages</text>
  
  <!-- Sulfonic Acids Branch -->
  <line x1="300" y1="170" x2="300" y2="210" class="connector"/>
  <rect x="200" y="210" width="200" height="40" class="subcat" rx="5"/>
  <text x="300" y="235" class="subcat-text">Sulfonic Acids</text>
  
  <line x1="300" y1="250" x2="300" y2="270" class="connector"/>
  <rect x="170" y="270" width="260" height="120" class="group" rx="3"/>
  <text x="180" y="290" class="group-text" font-weight="bold">Perfluoroalkyl sulfonic acids (PFSAs)</text>
  <text x="180" y="305" class="group-text">• C = F/2 - 0.5</text>
  <text x="180" y="320" class="group-text">• Examples: PFOS, PFHxS</text>
  <text x="180" y="335" class="group-text" font-style="italic">Polyfluoroalkyl sulfonic acids (PolyFSAs)</text>
  <text x="180" y="350" class="group-text">• C = (F+H+Cl+Br+I)/2 - 1</text>
  <text x="180" y="365" class="group-text" font-style="italic">Perfluoroalkylether sulfonic acids (PFESAs)</text>
  <text x="180" y="380" class="group-text">• Contains ether linkages</text>
  
  <!-- Other Acids -->
  <rect x="50" y="410" width="350" height="100" class="group" rx="3"/>
  <text x="60" y="430" class="group-text" font-weight="bold">Other Perfluoroalkyl Acids:</text>
  <text x="60" y="450" class="group-text">• Perfluoroalkyl sulfinic acids (PFSiAs)</text>
  <text x="60" y="465" class="group-text">• Perfluoroalkyl phosphonic acids (PFPAs)</text>
  <text x="60" y="480" class="group-text">• Perfluoroalkyl phosphinic acids (PFPiAs)</text>
  <text x="60" y="495" class="group-text">• Dicarboxylic acids, Disulfonic acids</text>
  
  <!-- Category 2: Acid Precursors -->
  <rect x="450" y="120" width="350" height="50" class="category" rx="8"/>
  <text x="625" y="150" class="cat-text" fill="white">Acid Precursors</text>
  
  <!-- Alcohols Branch -->
  <line x1="550" y1="170" x2="550" y2="210" class="connector"/>
  <rect x="450" y="210" width="200" height="40" class="subcat" rx="5"/>
  <text x="550" y="235" class="subcat-text">Alcohols</text>
  
  <line x1="550" y1="250" x2="550" y2="270" class="connector"/>
  <rect x="420" y="270" width="260" height="110" class="group" rx="3"/>
  <text x="430" y="290" class="group-text" font-weight="bold">Perfluoroalkyl alcohols</text>
  <text x="430" y="305" class="group-text">• C = (F+O)/2 - 1</text>
  <text x="430" y="320" class="group-text" font-style="italic">Fluorotelomer alcohols (FTOHs)</text>
  <text x="430" y="335" class="group-text">• n:2 FTOHs (6:2, 8:2, etc.)</text>
  <text x="430" y="350" class="group-text">• Precursors to PFCAs</text>
  <text x="430" y="365" class="group-text">• Examples: 6:2 FTOH, 8:2 FTOH</text>
  
  <!-- Other Precursors -->
  <line x1="700" y1="170" x2="700" y2="210" class="connector"/>
  <rect x="600" y="210" width="200" height="40" class="subcat" rx="5"/>
  <text x="700" y="235" class="subcat-text">Other Precursors</text>
  
  <line x1="700" y1="250" x2="700" y2="270" class="connector"/>
  <rect x="570" y="270" width="260" height="140" class="group" rx="3"/>
  <text x="580" y="290" class="group-text" font-weight="bold">Various Precursors:</text>
  <text x="580" y="310" class="group-text">• Perfluoroalkyl iodides (PFAIs)</text>
  <text x="580" y="325" class="group-text">• Perfluoroalkane sulfonyl fluorides (PASFs)</text>
  <text x="580" y="340" class="group-text">• Perfluoroalkyl ketones</text>
  <text x="580" y="355" class="group-text">• Semi-fluorinated alkanes (SFAs)</text>
  <text x="580" y="370" class="group-text">• Perfluoroalkenes</text>
  <text x="580" y="385" class="group-text">• Hydrofluoroolefins (HFOs)</text>
  <text x="580" y="400" class="group-text">• Acyl halides</text>
  
  <!-- Category 3: Ethers -->
  <rect x="850" y="120" width="300" height="50" class="category" rx="8"/>
  <text x="1000" y="150" class="cat-text" fill="white">Fluorinated Ethers</text>
  
  <line x1="1000" y1="170" x2="1000" y2="210" class="connector"/>
  <rect x="870" y="210" width="260" height="110" class="group" rx="3"/>
  <text x="880" y="230" class="group-text" font-weight="bold">Perfluoropolyethers (PFPEs)</text>
  <text x="880" y="245" class="group-text">• C = F/2 - 1, O ≥ 2</text>
  <text x="880" y="260" class="group-text">• Multiple ether linkages</text>
  <text x="880" y="280" class="group-text" font-weight="bold">Hydrofluoroethers (HFEs)</text>
  <text x="880" y="295" class="group-text">• C = (F+H)/2 - 1, O ≥ 1</text>
  <text x="880" y="310" class="group-text">• Only C, F, O, H atoms</text>
  
  <!-- Category 4: Hydrofluorocarbons -->
  <rect x="50" y="540" width="350" height="50" class="category" rx="8"/>
  <text x="225" y="570" class="cat-text" fill="white">Hydrofluorocarbons</text>
  
  <line x1="225" y1="590" x2="225" y2="610" class="connector"/>
  <rect x="70" y="610" width="310" height="110" class="group" rx="3"/>
  <text x="80" y="630" class="group-text" font-weight="bold">Hydrofluorocarbons (HFCs)</text>
  <text x="80" y="645" class="group-text">• Only C, F, H atoms</text>
  <text x="80" y="660" class="group-text">• F ≥ 1</text>
  <text x="80" y="675" class="group-text">• C = (F+H)/2 - 1</text>
  <text x="80" y="690" class="group-text">• Used as refrigerants</text>
  <text x="80" y="705" class="group-text">• Examples: HFC-134a, HFC-125</text>
  
  <!-- Category 5: Perfluoroalkanes -->
  <rect x="450" y="540" width="350" height="50" class="category" rx="8"/>
  <text x="625" y="570" class="cat-text" fill="white">Perfluoroalkanes</text>
  
  <line x1="625" y1="590" x2="625" y2="610" class="connector"/>
  <rect x="470" y="610" width="310" height="90" class="group" rx="3"/>
  <text x="480" y="630" class="group-text" font-weight="bold">Perfluoroalkanes</text>
  <text x="480" y="645" class="group-text">• Fully fluorinated saturated alkanes</text>
  <text x="480" y="660" class="group-text">• C = F/2 - 1</text>
  <text x="480" y="675" class="group-text">• Examples: Perfluorohexane, Perfluorodecalin</text>
  <text x="480" y="690" class="group-text">• Used in applications requiring chemical inertness</text>
  
  <!-- Category 6: Aromatic PFAS -->
  <rect x="850" y="540" width="300" height="50" class="category" rx="8"/>
  <text x="1000" y="570" class="cat-text" fill="white">Aromatic PFAS</text>
  
  <line x1="1000" y1="590" x2="1000" y2="610" class="connector"/>
  <rect x="870" y="610" width="260" height="90" class="group" rx="3"/>
  <text x="880" y="630" class="group-text" font-weight="bold">Side-chain fluorinated aromatics</text>
  <text x="880" y="645" class="group-text">• Aromatic ring with fluorinated side chain</text>
  <text x="880" y="660" class="group-text">• Pattern: aromatic-C-perfluoroalkyl</text>
  <text x="880" y="680" class="group-text" font-weight="bold">Fluorinated benzodioxoles</text>
  <text x="880" y="695" class="group-text">• F ≥ 2 on benzodioxole ring</text>
  
  <!-- Category 7: Other Functional Groups -->
  <rect x="50" y="750" width="1100" height="50" class="category" rx="8"/>
  <text x="600" y="780" class="cat-text" fill="white">Other Fluorinated Functional Groups</text>
  
  <!-- Row 1 of other groups -->
  <rect x="50" y="820" width="250" height="110" class="group" rx="3"/>
  <text x="60" y="840" class="group-text" font-weight="bold">Nitrogen-containing:</text>
  <text x="60" y="860" class="group-text">• Perfluoroalkyl amines</text>
  <text x="60" y="875" class="group-text">• Amides (fluorinated)</text>
  <text x="60" y="890" class="group-text">• Sulfonamides (fluorinated)</text>
  <text x="60" y="905" class="group-text">• Azoles, Azines</text>
  <text x="60" y="920" class="group-text">• C = F/2 - 1.5 (for tert-amines)</text>
  
  <rect x="320" y="820" width="250" height="110" class="group" rx="3"/>
  <text x="330" y="840" class="group-text" font-weight="bold">Carbonyl-containing:</text>
  <text x="330" y="860" class="group-text">• Ketones (fluorinated)</text>
  <text x="330" y="875" class="group-text">• Semi-fluoroalkyl ketones</text>
  <text x="330" y="890" class="group-text">• Esters (fluorinated)</text>
  <text x="330" y="905" class="group-text">• Carboxylic acids (generic)</text>
  <text x="330" y="920" class="group-text">• Acyl halides</text>
  
  <rect x="590" y="820" width="250" height="110" class="group" rx="3"/>
  <text x="600" y="840" class="group-text" font-weight="bold">Sulfur-containing:</text>
  <text x="600" y="860" class="group-text">• Sulfonic acids (generic)</text>
  <text x="600" y="875" class="group-text">• Sulfenic acids</text>
  <text x="600" y="890" class="group-text">• Sulfinic acids (generic)</text>
  <text x="600" y="905" class="group-text">• Sulfonamides</text>
  <text x="600" y="920" class="group-text">• Sulfonyl fluorides</text>
  
  <rect x="860" y="820" width="250" height="110" class="group" rx="3"/>
  <text x="870" y="840" class="group-text" font-weight="bold">Other groups:</text>
  <text x="870" y="860" class="group-text">• Phosphonic acids (fluorinated)</text>
  <text x="870" y="875" class="group-text">• Phosphinic acids (fluorinated)</text>
  <text x="870" y="890" class="group-text">• Iodides (fluorinated)</text>
  <text x="870" y="905" class="group-text">• Alkenes, Alkynes (fluorinated)</text>
  <text x="870" y="920" class="group-text">• Ethene (fluorinated)</text>
  
  <!-- Key Concepts Box -->
  <rect x="50" y="960" width="1100" height="180" fill="#fff9e6" stroke="#ffc107" stroke-width="3" rx="8"/>
  <text x="600" y="990" class="cat-text">Key Concepts</text>
  
  <text x="70" y="1020" class="group-text" font-weight="bold">Perfluoroalkyl vs Polyfluoroalkyl:</text>
  <text x="70" y="1040" class="group-text">• <tspan font-weight="bold">Perfluoroalkyl:</tspan> All hydrogen atoms replaced by fluorine (fully fluorinated carbon chain)</text>
  <text x="70" y="1055" class="group-text">• <tspan font-weight="bold">Polyfluoroalkyl:</tspan> Some hydrogen atoms replaced by fluorine (partially fluorinated)</text>
  
  <text x="70" y="1080" class="group-text" font-weight="bold">Constraint Notation:</text>
  <text x="70" y="1100" class="group-text">• <tspan font-weight="bold">rel:</tspan> Relational constraint (e.g., C = F/2 + 0.5 means carbon count equals half fluorines plus 0.5)</text>
  <text x="70" y="1115" class="group-text">• <tspan font-weight="bold">gte:</tspan> Greater than or equal (minimum count)</text>
  <text x="70" y="1130" class="group-text">• <tspan font-weight="bold">only:</tspan> Only these elements allowed (e.g., only C, F, H for HFCs)</text>
  
  <!-- Statistics Box -->
  <rect x="50" y="1160" width="1100" height="120" fill="#e7f3ff" stroke="#667eea" stroke-width="3" rx="8"/>
  <text x="600" y="1190" class="cat-text">Database Statistics</text>
  
  <text x="100" y="1220" class="group-text" font-size="14">📊 <tspan font-weight="bold">51 PFAS group definitions</tspan> in complete database</text>
  <text x="100" y="1240" class="group-text" font-size="14">🔬 <tspan font-weight="bold">Major categories:</tspan> Acids (15), Precursors (12), Ethers (2), Aromatics (2), Other (20)</text>
  <text x="100" y="1260" class="group-text" font-size="14">⚗️ <tspan font-weight="bold">Most common:</tspan> PFCAs, PFSAs, FTOHs (fluorotelomer alcohols)</text>
  
  <!-- Footer -->
  <text x="600" y="1320" class="group-text" font-size="12" text-anchor="middle" fill="#666">This diagram shows the hierarchical organization of PFAS chemical groups</text>
  <text x="600" y="1340" class="group-text" font-size="12" text-anchor="middle" fill="#666">Each group has specific SMARTS patterns and formula constraints for identification</text>
  <text x="600" y="1360" class="group-text" font-size="12" text-anchor="middle" fill="#666">Web analyzer implements 15+ core groups; Python library includes all 51 definitions</text>
</svg>
